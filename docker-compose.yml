services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  cerebro-server:
    build: ./server
    restart: unless-stopped
    ports:
      - "${CEREBRO_PORT:-8000}:8000"
    environment:
      # Optional — leave empty and the master auto-generates one into /data/token on first boot.
      # Retrieve any time with: docker compose exec cerebro-server cerebro-server token
      - CEREBRO_TOKEN=${CEREBRO_TOKEN:-}
      - REDIS_URL=redis://redis:6379
      - CEREBRO_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HOME=/root
    volumes:
      - ${HOME}/.claude:/home/cerebro/.claude
      - ${HOME}/.claude.json:/mnt/host-claude-config.json:ro
      # Persistent storage for agent backups (survives Redis data loss).
      - cerebro_data:/data
    depends_on:
      - redis

volumes:
  redis_data:
  cerebro_data:
